<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Tycoon V2</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  html, body { margin:0; padding:0; height:100%; font-family: 'Segoe UI', sans-serif; }
  body { display:flex; flex-direction: column; }

  /* Hlavní kontejner */
  #main-container { flex:1; display:flex; flex-direction: column; }

  /* Mapa */
  #map { flex:1 1 65%; }

  /* Panel s taby */
  #panel { flex:1 1 35%; background:#f4f4f4; display:flex; flex-direction: column; border-top:2px solid #ccc; }

  /* Tabs */
  #tabs { display:flex; border-bottom:1px solid #ddd; }
  .tab { flex:1; padding:10px; background:#eee; cursor:pointer; text-align:center; font-weight:500; }
  .tab.active { background:#fff; font-weight:bold; }

  /* Obsah tabů */
  #tab-content { padding:10px; overflow-y:auto; flex:1; }

  /* Scroll box pro dispatch */
  .dispatch-scroll { max-height:170px; overflow-y:auto; border:1px solid #ccc; border-radius:8px; padding:5px; }

  /* Modální okna */
  .modal {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center;
    z-index:999; display:none;
  }
  .modal-content {
    background:white; padding:20px; border-radius:8px; width:90%; max-width:350px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); position:relative;
  }
  .close-btn { position:absolute; top:10px; right:15px; cursor:pointer; font-weight:bold; font-size:18px; }

  /* Buttons */
  button { border:none; padding:8px 12px; margin:4px; border-radius:8px; cursor:pointer; font-weight:500; }
  .btn-dispatch { background: #2b7bff; color:white; }
  .btn-buy { background: #28a745; color:white; }
  .btn-sell { background:#ff7043; color:white; }
  .btn-economy { background:#ffc107; color:#222; }

  /* Responsivita */
  @media(max-width:480px){
    #panel { flex:1 1 40%; }
    .tab { font-size:0.9em; padding:8px; }
  }

</style>
</head>

<body>
<div id="main-container">

  <!-- Mapa -->
  <div id="map"></div>

  <!-- Panel s taby -->
  <div id="panel">
    <div id="tabs">
      <div class="tab active" data-tab="dispatch">Dispečink</div>
      <div class="tab" data-tab="vehicles">Vozidla</div>
      <div class="tab" data-tab="economy">Ekonomika</div>
      <div class="tab" data-tab="progress">Vývoj</div>
    </div>

    <div id="tab-content">
      <h3>Dispečink</h3>
      <p>Zde budou čekající objednávky paliva a tankery.</p>
    </div>
  </div>

</div>

<!-- Modální okno (placeholder pro vozidlo/dispatch) -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div id="modal-inner">
      <p>Zde bude obsah modálu.</p>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // 🌍 Inicializace mapy
  const terminalLat = 49.1196904;
  const terminalLon = 13.8485080;

  const map = L.map('map').setView([terminalLat, terminalLon], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM', maxZoom:18 }).addTo(map);

  // Ikona terminálu
  const terminalIcon = L.icon({
    iconUrl: 'https://i.imgur.com/puN4S0i.jpeg',
    iconSize: [40,40],
    iconAnchor: [20,40],
    popupAnchor: [0,-40]
  });
  L.marker([terminalLat, terminalLon], {icon:terminalIcon}).addTo(map).bindPopup("Terminál").openPopup();

  // 🌟 Tabs logika
  const tabs = document.querySelectorAll('.tab');
  const tabContent = document.getElementById('tab-content');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderTab(tab.dataset.tab);
    });
  });

  function renderTab(tabName){
    if(tabName==='dispatch'){
      tabContent.innerHTML=`<h3>Dispečink</h3><p>Zde budou čekající objednávky paliva.</p>`;
    } else if(tabName==='vehicles'){
      tabContent.innerHTML=`<h3>Vozidla</h3><p>Seznam tankerů, možnost nákupu a servisu.</p>`;
    } else if(tabName==='economy'){
      tabContent.innerHTML=`<h3>Ekonomika</h3><p>Pokladna, zisky, náklady.</p>`;
    } else if(tabName==='progress'){
      tabContent.innerHTML=`<h3>Vývoj</h3><p>Milníky a odemykání funkcí.</p>`;
    }
  }

  // 🌟 Modál
  function showModal(htmlContent){
    document.getElementById('modal-inner').innerHTML=htmlContent;
    document.getElementById('modal').style.display='flex';
  }
  function closeModal(){
    document.getElementById('modal').style.display='none';
  }

</script>
</body>
</html>
