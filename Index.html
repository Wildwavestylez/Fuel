<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Tycoon V2</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="main-container">
    <div id="map"></div>
    <div id="panel">
      <div id="tabs">
        <button class="tab active" data-tab="dispatch">Dispečink</button>
        <button class="tab" data-tab="vehicles">Vozidla</button>
        <button class="tab" data-tab="economy">Ekonomika</button>
        <button class="tab" data-tab="progress">Vývoj</button>
      </div>
      <div id="tab-content">
        <h3>Dispečink</h3>
        <p>Zde budou skupiny cestujících a objednávky.</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script src="js/dispatch.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/economy.js"></script>
  <script src="js/main.js"></script>

</html>
